name: Daily Stock Scan

on:
  schedule:
    # Runs every 30 mins, Mon-Fri, from 13:00 to 21:00 UTC (roughly market hours)
    - cron: '*/30 10-21 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 for 2026 compatibility

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # THIS IS THE CRITICAL FIX:
          PYTHONPATH: ${{ github.workspace }} 
        run: python main.py

      - name: Commit Updated Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add results/signals.csv

          git diff --cached --quiet || git commit -m "Update live scan results"

          git pull --rebase
          git push
